name: Release Skills

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing vX.Y.Z tag to release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    if: github.event.repository.private == false
    runs-on: ubuntu-latest
    steps:
      - name: Resolve release tag
        id: release
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            tag="${{ inputs.tag }}"
          else
            tag="${GITHUB_REF_NAME}"
          fi
          if [[ ! "$tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must match vX.Y.Z, got: $tag" >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v6
        with:
          ref: ${{ steps.release.outputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false

      - run: python3 -m pip install -e ".[dev]"
      - run: python3 scripts/check_release.py ${{ steps.release.outputs.tag }}
      - run: python3 scripts/sync_skill_references.py --check
      - run: python3 scripts/validate_skills.py
      - run: bash scripts/spec_validate_skills.sh
      - run: pytest -q
      - run: python3 -m ruff check scripts tests
      - run: npx -y skills add . --list
      - run: bash scripts/smoke_install_skills.sh

      - name: Smoke-test public skills install
        run: bash scripts/smoke_install_skills.sh VincenzoImp/academic-research-skills

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.release.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            echo "GitHub Release $tag already exists; skipping creation."
          else
            gh release create "$tag" \
              --verify-tag \
              --generate-notes \
              --latest
          fi
