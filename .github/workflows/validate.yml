name: Validate Skills

on:
  pull_request:
  push:
    branches: [main, redesign-0.2]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v7
        with:
          python-version: "3.12"
      - run: python3 scripts/validate_skills.py
