name: Validate Skills

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  workflow-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          package-manager-cache: false
      - run: npx -y github-actionlint

  validate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: ["22", "24"]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
      - run: python3 -m pip install -e ".[dev]"
      - name: Check release metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(python3 - <<'PY'
          import tomllib

          with open("pyproject.toml", "rb") as handle:
              print(tomllib.load(handle)["project"]["version"])
          PY
          )"
          python3 scripts/check_release.py "v$version"
      - run: python3 scripts/sync_skill_references.py --check
      - run: python3 scripts/validate_skills.py
      - run: bash scripts/spec_validate_skills.sh
      - run: pytest -q
      - run: python3 -m ruff check scripts tests
      - run: npx -y skills add . --list
      - run: bash scripts/smoke_install_skills.sh
